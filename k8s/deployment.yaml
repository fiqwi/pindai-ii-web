apiVersion: apps/v1
kind: Deployment
metadata:
  name: pindai-ii-web
  namespace: pindai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pindai-ii-web
  template:
    metadata:
      labels:
        app: pindai-ii-web
    spec:
      containers:
        - name: web
          image: ghcr.io/pindaiai/pindai-ii-web:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: pindai-ii-web
  namespace: pindai
spec:
  selector:
    app: pindai-ii-web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pindai-ii-web
  namespace: pindai
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - ii.pindai.ai
      secretName: pindai-ii-web-tls
  rules:
    - host: ii.pindai.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pindai-ii-web
                port:
                  number: 80
